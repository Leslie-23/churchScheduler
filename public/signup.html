<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up — Stewardly</title>
  <link rel="stylesheet" href="/landing.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Sign Up</h1>
      <p class="subtitle">Create your Stewardly account.</p>

      <div class="auth-error" id="error-msg"></div>

      <form id="signup-form" onsubmit="return handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="phone" placeholder="e.g. 0241234567" autocomplete="tel">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-input" id="gender" required>
            <option value="">Select</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="password2" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="submit-btn">Sign Up</button>
      </form>

      <div class="auth-divider">or</div>

      <button class="google-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Log In</a>
      </div>
    </div>
  </div>

  <script src="/landing.js"></script>
  <script>
    checkExistingAuth();

    async function handleSignup(e) {
      e.preventDefault();
      clearError();

      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      if (password !== password2) {
        showError("Passwords do not match");
        return;
      }

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Creating account...";

      try {
        const res = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            gender: document.getElementById("gender").value,
            password,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || "Signup failed");
          return;
        }
        localStorage.setItem("auth_token", data.token);
        window.location.href = "/onboarding.html";
      } catch {
        showError("Connection failed. Try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign Up";
      }
    }
  </script>
</body>
</html>
